name: Nightly Benchmarks

on:
  schedule:
    - cron: '0 2 * * *'  # Every day at 2 AM UTC
  workflow_dispatch:
    inputs:
      iterations:
        description: 'Number of benchmark iterations'
        required: false
        default: '10'
      circuits:
        description: 'Circuits to benchmark (comma-separated, empty for all)'
        required: false
        default: ''

env:
  CARGO_TERM_COLOR: always
  NOIR_VERSION: "1.0.0-beta.11"
  DIAGNOSTICS_DIR: "out/nightly-diagnostics"

jobs:
  bench-full:
    name: Full Benchmark Suite
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Guard core schema invariants
        run: ./scripts/ci/check_core_schema_unchanged.sh

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-nightly-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-nightly-
            ${{ runner.os }}-cargo-

      - name: Install Noir toolchain
        run: |
          curl -L https://raw.githubusercontent.com/noir-lang/noirup/main/install | bash
          echo "$HOME/.nargo/bin" >> $GITHUB_PATH
          $HOME/.nargo/bin/noirup -v ${{ env.NOIR_VERSION }}

      - name: Install Barretenberg
        run: |
          BB_VERSION="0.82.2"
          curl -L "https://github.com/AztecProtocol/aztec-packages/releases/download/v${BB_VERSION}/barretenberg-amd64-linux.tar.gz" -o bb.tar.gz
          tar -xzf bb.tar.gz
          sudo mv bb /usr/local/bin/bb
          chmod +x /usr/local/bin/bb
          bb --version

      - name: Build noir-bench (release)
        run: cargo build --release

      - name: Compile all example circuits
        run: |
          for dir in examples/*/; do
            if [ -f "$dir/Nargo.toml" ]; then
              echo "Compiling $dir..."
              (cd "$dir" && nargo compile) || echo "Failed to compile $dir"
            fi
          done

      - name: Download previous nightly baseline
        id: download-baseline
        uses: actions/download-artifact@v4
        with:
          name: noir-bench-nightly-baseline
          path: .
        continue-on-error: true

      - name: Run full benchmark suite
        id: bench
        run: |
          set +e
          ITERATIONS="${{ github.event.inputs.iterations || '10' }}"
          CIRCUITS="${{ github.event.inputs.circuits }}"
          mkdir -p "${DIAGNOSTICS_DIR}"

          CIRCUIT_ARGS=()
          if [ -n "$CIRCUITS" ]; then
            CIRCUIT_ARGS=(--circuits "$CIRCUITS")
          fi

          echo "Running full benchmark suite..."
          echo "  Iterations: $ITERATIONS"
          echo "  Circuits: ${CIRCUITS:-all}"
          echo ""

          ./target/release/noir-bench ci \
            --iterations "$ITERATIONS" \
            --warmup 3 \
            --threshold 5.0 \
            --format markdown \
            --baseline-file .noir-bench-nightly-baseline.jsonl \
            --output "${DIAGNOSTICS_DIR}/nightly-results.jsonl" \
            --json-out "${DIAGNOSTICS_DIR}/compare.json" \
            --html-out "${DIAGNOSTICS_DIR}/compare.html" \
            "${CIRCUIT_ARGS[@]}" \
            > bench-report.md 2>&1

          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT

          # Ensure diagnostics files always exist, even when baseline compare is unavailable.
          [ -f "${DIAGNOSTICS_DIR}/nightly-results.jsonl" ] || : > "${DIAGNOSTICS_DIR}/nightly-results.jsonl"
          if [ ! -f "${DIAGNOSTICS_DIR}/compare.json" ]; then
            echo '{"note":"baseline unavailable; comparison skipped"}' > "${DIAGNOSTICS_DIR}/compare.json"
          fi
          if [ ! -f "${DIAGNOSTICS_DIR}/compare.html" ]; then
            cat > "${DIAGNOSTICS_DIR}/compare.html" <<'EOF'
<!doctype html><html><head><meta charset="utf-8"><title>noir-bench nightly compare</title></head><body><p>Baseline unavailable; comparison skipped.</p></body></html>
EOF
          fi

          cat bench-report.md

      - name: Build history diagnostics
        if: always()
        run: |
          mkdir -p "${DIAGNOSTICS_DIR}/history"
          ./target/release/noir-bench history build \
            --jsonl "${DIAGNOSTICS_DIR}/nightly-results.jsonl" \
            --out "${DIAGNOSTICS_DIR}/history" || true

          [ -f "${DIAGNOSTICS_DIR}/history/index.json" ] || echo "[]" > "${DIAGNOSTICS_DIR}/history/index.json"
          if [ ! -f "${DIAGNOSTICS_DIR}/history/index.html" ]; then
            cat > "${DIAGNOSTICS_DIR}/history/index.html" <<'EOF'
<!doctype html><html><head><meta charset="utf-8"><title>noir-bench history</title></head><body><p>History build unavailable.</p></body></html>
EOF
          fi

      - name: Write concise diagnostics summary
        if: always()
        run: |
          RESULT="no regressions"
          if [ "${{ steps.bench.outputs.exit_code }}" != "0" ] && [ -n "${{ steps.bench.outputs.exit_code }}" ]; then
            RESULT="regressions detected (warn-only)"
          fi

          {
            echo "## Nightly Diagnostics"
            echo "- Run: #${{ github.run_number }}"
            echo "- Date (UTC): $(date -u +"%Y-%m-%d %H:%M UTC")"
            echo "- Noir Version: ${{ env.NOIR_VERSION }}"
            echo "- CI Exit Code: ${{ steps.bench.outputs.exit_code }}"
            echo "- Result: ${RESULT}"
            echo "- Artifact files: nightly-results.jsonl, compare.json, compare.html, history/index.json, history/index.html"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload nightly diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: noir-bench-nightly-diagnostics-${{ github.run_number }}
          path: ${{ env.DIAGNOSTICS_DIR }}
          retention-days: 90

      - name: Update nightly baseline
        uses: actions/upload-artifact@v4
        with:
          name: noir-bench-nightly-baseline
          path: ${{ env.DIAGNOSTICS_DIR }}/nightly-results.jsonl
          retention-days: 180
          overwrite: true

      - name: Report regression (if any)
        if: steps.bench.outputs.exit_code != '0' && steps.bench.outputs.exit_code != ''
        run: |
          echo "::warning::Nightly benchmark regression detected!"
          # Don't fail nightly builds, just warn

  # Optional: Run benchmarks on multiple platforms
  bench-macos:
    name: macOS Benchmarks
    runs-on: macos-latest
    timeout-minutes: 60
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Noir toolchain
        run: |
          curl -L https://raw.githubusercontent.com/noir-lang/noirup/main/install | bash
          echo "$HOME/.nargo/bin" >> $GITHUB_PATH
          $HOME/.nargo/bin/noirup -v ${{ env.NOIR_VERSION }}

      - name: Install Barretenberg
        run: |
          BB_VERSION="0.82.2"
          if [[ "$(uname -m)" == "arm64" ]]; then
            ARCH="arm64"
          else
            ARCH="amd64"
          fi
          curl -L "https://github.com/AztecProtocol/aztec-packages/releases/download/v${BB_VERSION}/barretenberg-${ARCH}-darwin.tar.gz" -o bb.tar.gz
          tar -xzf bb.tar.gz
          sudo mv bb /usr/local/bin/bb
          chmod +x /usr/local/bin/bb

      - name: Build noir-bench
        run: cargo build --release

      - name: Compile example circuits
        run: |
          for dir in examples/*/; do
            if [ -f "$dir/Nargo.toml" ]; then
              (cd "$dir" && nargo compile) || true
            fi
          done

      - name: Run benchmarks
        run: |
          ./target/release/noir-bench ci \
            --iterations 5 \
            --format markdown \
            > bench-report-macos.md 2>&1 || true
          cat bench-report-macos.md

      - name: Upload macOS results
        uses: actions/upload-artifact@v4
        with:
          name: noir-bench-macos-${{ github.run_number }}
          path: bench-report-macos.md
          retention-days: 30
